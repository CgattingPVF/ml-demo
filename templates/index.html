<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PVF ML Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body class="layout-home" data-default-dataset="{{ default_dataset_path }}">
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="page">
      <header class="hero">
        <p class="eyebrow">PVF Internal Platform</p>
        <h1>Machine Learning Workspace</h1>
        <p class="hero-copy">
          Enter new jobs, get predictive outcomes, and generate detailed client and partner profile cards from your dataset.
        </p>
      </header>

      <section class="card">
        <h2>Model Training</h2>
        <div class="grid two">
          <label>
            Dataset path
            <input id="train-dataset-path" type="text" />
          </label>
          <label>
            Target column
            <input id="train-target-column" type="text" placeholder="e.g. status" />
          </label>
          <label>
            Task type
            <select id="train-task-type">
              <option value="">Auto</option>
              <option value="classification">Classification</option>
              <option value="regression">Regression</option>
            </select>
          </label>
          <label>
            Test size
            <input id="train-test-size" type="number" min="0.05" max="0.5" step="0.05" value="0.2" />
          </label>
          <label>
            Random state
            <input id="train-random-state" type="number" value="42" />
          </label>
        </div>
        <div class="actions">
          <button id="train-btn" class="btn primary">Train Model</button>
          <button id="profile-dataset-btn" class="btn">Profile Dataset</button>
        </div>
        <div id="train-output" class="output"></div>
      </section>

      <section class="card">
        <h2>New Job Intake & Prediction</h2>
        <div class="grid two">
          <label>
            Experiment
            <select id="intake-experiment-select"></select>
          </label>
          <label>
            Form fields
            <input id="intake-max-fields" type="number" min="8" max="40" step="2" value="18" />
          </label>
          <label class="wide">
            Profile dataset path
            <input id="intake-profile-path" type="text" />
          </label>
        </div>
        <div class="actions">
          <button id="load-intake-template-btn" class="btn primary">Load Intake Form</button>
        </div>

        <form id="intake-form" class="intake-form"></form>

        <div class="actions">
          <button id="predict-intake-btn" class="btn accent">Predict New Job</button>
        </div>
        <div id="intake-output" class="output"></div>
      </section>

      <section class="card">
        <h2>Profile Cards</h2>
        <div class="grid two">
          <label>
            Dataset path
            <input id="profile-dataset-path" type="text" />
          </label>
          <label>
            Profile type
            <select id="profile-type">
              <option value="client">Client</option>
              <option value="partner">Partner</option>
            </select>
          </label>
          <label>
            Entity list
            <select id="profile-entity-select"></select>
          </label>
          <label>
            Or manual name
            <input id="profile-manual-name" type="text" placeholder="Type exact entity name" />
          </label>
        </div>
        <div class="actions">
          <button id="load-entities-btn" class="btn">Load Entities</button>
          <button id="generate-profile-btn" class="btn primary">Generate Profile Card</button>
        </div>
        <div id="profile-output" class="output"></div>
      </section>
    </main>

    <template id="profile-card-template">
      <article class="profile-card">
        <header>
          <h3 class="profile-title"></h3>
          <p class="profile-subtitle"></p>
        </header>
        <div class="metrics-grid"></div>
        <div class="profile-columns">
          <div class="profile-panel">
            <h4>Portfolio & Delivery</h4>
            <div class="mini-table portfolio-table"></div>
          </div>
          <div class="profile-panel">
            <h4>Financials</h4>
            <div class="mini-table financial-table"></div>
          </div>
        </div>
        <div class="profile-panel">
          <h4>Recent Jobs</h4>
          <div class="table-wrap">
            <table class="recent-table"></table>
          </div>
        </div>
      </article>
    </template>

    <script src="/static/js/app.js"></script>
  </body>
</html>
